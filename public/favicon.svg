<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Definining Gradients and Filters -->
  <defs>
    <!-- Background Gradient: Rich Purple to Vibrant Cyan -->
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e14ff" />
      <stop offset="1%" stop-color="#863bff" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    
    <!-- Book cover gradient: Deep Dark Indigo -->
    <linearGradient id="grad-book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular background badge with gradient -->
  <rect width="512" height="512" rx="128" fill="url(#grad-bg)" />

  <!-- Graduation Cap & AI Sparkles Icon Concept -->
  <g transform="translate(0, -10)">
    <!-- Book Base / Pages -->
    <path d="M136 290c0-30 30-50 60-50h180v140H196c-30 0-60-20-60-50V290z" fill="#ffffff" opacity="0.85" />
    <path d="M120 280c0-30 30-50 60-50h180v140H180c-30 0-60-20-60-50V280z" fill="url(#grad-book)" />
    
    <!-- Graduation Cap / Mortarboard on Top -->
    <!-- Cap Diamond -->
    <polygon points="256,110 390,165 256,220 122,165" fill="#ffffff" filter="url(#glow)" />
    <polygon points="256,118 376,165 256,212 136,165" fill="#1e1b4b" />

    <!-- Cap Neck / Skullcap -->
    <path d="M190 180v35c0 25 30 45 66 45s66-20 66-45v-35" fill="#1e1b4b" />
    
    <!-- Tassel -->
    <path d="M256 165l95 25v30" stroke="#00f2fe" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="351" cy="225" r="8" fill="#00f2fe" />

    <!-- Glowing AI Sparkle/Star in the center of the Cap -->
    <path d="M256 135l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#00f2fe" filter="url(#glow)" />

    <!-- Scientific / AI Nodes floating around -->
    <circle cx="110" cy="230" r="10" fill="#ffffff" opacity="0.9" />
    <circle cx="400" cy="240" r="12" fill="#00f2fe" filter="url(#glow)" />
    <circle cx="380" cy="330" r="8" fill="#ffffff" opacity="0.8" />
    
    <!-- Connecting lines (AI Network style) -->
    <line x1="110" y1="230" x2="150" y2="250" stroke="#ffffff" stroke-width="3" stroke-dasharray="4 4" opacity="0.6" />
    <line x1="400" y1="240" x2="350" y2="270" stroke="#00f2fe" stroke-width="3" stroke-dasharray="4 4" opacity="0.6" />
  </g>
</svg>